# Example configuration for termianlagent.
# Copy to config.yaml and edit. Environment variables override these values.

provider: openai          # openai | anthropic | ollama | sambanova | agnes
model: ""                  # empty = provider default
temperature: 0.7
enable_tools: true
theme: midnight           # midnight | solarized | dracula | mono
max_history_messages: 40

# Optional per-provider tuning
providers:
  openai:
    model: gpt-4o
  anthropic:
    model: claude-3-5-sonnet-latest
  ollama:
    base_url: http://localhost:11434

  sambanova:
    base_url: https://api.sambanova.ai/v1
    model: MiniMax-M2.7
  agnes:
    base_url: https://apihub.agnes-ai.com/v1
    model: agnes-2.5-flash
